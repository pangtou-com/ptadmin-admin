openapi: 3.0.3
info:
  title: PTAdmin Admin API
  version: 1.0.0
  description: |
    PTAdmin 后台接口文档。

    说明：
    - 默认管理后台接口前缀为 `system`，可通过 `PTADMIN_ROUTE_PREFIX` 或 `app.prefix` 调整。
    - 除特殊声明外，所有接口统一返回 JSON：
      - 成功：`{ "code": 0, "message": "操作成功", "data": ... }`
      - 分页：`{ "code": 0, "message": "", "data": { "total": 0, "results": [] } }`
      - 失败：`{ "code": 10000/20000, "message": "错误信息" }`
    - 当前文档仅收录可直接作为 API 调用的 JSON 接口；安装页面、后台页面渲染接口未纳入。
servers:
  - url: /{adminPrefix}
    description: 后台接口前缀
    variables:
      adminPrefix:
        default: system
tags:
  - name: Auth
  - name: Upload
  - name: Asset
  - name: Operation
  - name: Dashboard
  - name: Admin
  - name: Role
  - name: Resource
  - name: Tenant
  - name: Organization
  - name: Settings
  - name: Addon
security:
  - bearerAuth: []
paths:
  /login:
    post:
      tags: [Auth]
      summary: 管理员登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /auth/status:
    get:
      tags: [Auth]
      summary: 获取授权模块状态
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /logout:
    get:
      tags: [Auth]
      summary: 退出登录
      responses:
        '200':
          description: 返回登录地址
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          url:
                            type: string
                            example: /system/login
        default:
          $ref: '#/components/responses/ErrorResponse'

  /user/resources:
    get:
      tags: [Auth]
      summary: 获取当前登录用户角色与菜单树
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /upload:
    post:
      tags: [Upload]
      summary: 上传单文件
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadRequest'
      responses:
        '200':
          description: 返回资源信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /upload/tiny:
    post:
      tags: [Upload]
      summary: TinyMCE 上传
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadRequest'
      responses:
        '200':
          description: TinyMCE location 响应
          content:
            application/json:
              schema:
                type: object
                properties:
                  location:
                    type: string
                    example: /storage/default/20260410/demo.png
        default:
          $ref: '#/components/responses/ErrorResponse'

  /assets:
    get:
      tags: [Asset]
      summary: 资源分页列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Keyword'
        - $ref: '#/components/parameters/Group'
      responses:
        '200':
          $ref: '#/components/responses/PagedResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [Asset]
      summary: 删除资源
      parameters:
        - $ref: '#/components/parameters/Ids'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /assets/picker:
    get:
      tags: [Asset]
      summary: 资源选择器分页列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Keyword'
        - $ref: '#/components/parameters/Group'
      responses:
        '200':
          $ref: '#/components/responses/PagedResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /operations:
    get:
      tags: [Operation]
      summary: 操作日志分页列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Keyword'
      responses:
        '200':
          $ref: '#/components/responses/PagedResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /operations/{id}:
    get:
      tags: [Operation]
      summary: 操作日志详情
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /admins/login-logs:
    get:
      tags: [Admin]
      summary: 管理员登录日志列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Keyword'
      responses:
        '200':
          $ref: '#/components/responses/PagedResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /message/unread:
    get:
      tags: [Auth]
      summary: 未读消息数
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /dashboard:
    get:
      tags: [Dashboard]
      summary: 获取当前用户最终仪表盘
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: 仪表盘配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardConsoleResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /dashboard/widgets:
    get:
      tags: [Dashboard]
      summary: 获取当前用户可见的仪表盘组件定义
      parameters:
        - $ref: '#/components/parameters/Group'
      responses:
        '200':
          description: 仪表盘组件定义列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardWidgetListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /dashboard/widgets/{code}/query:
    post:
      tags: [Dashboard]
      summary: 查询仪表盘组件数据
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardWidgetQueryRequest'
      responses:
        '200':
          description: 仪表盘组件数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardWidgetRuntimeResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /dashboard/widgets/{code}/actions/{action}:
    post:
      tags: [Dashboard]
      summary: 执行仪表盘组件动作
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: code
          in: path
          required: true
          schema:
            type: string
        - name: action
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardWidgetActionRequest'
      responses:
        '200':
          description: 仪表盘组件动作执行结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardWidgetRuntimeResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /dashboard/me/widgets:
    get:
      tags: [Dashboard]
      summary: 获取当前用户个人仪表盘配置
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: 个人仪表盘组件配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardWidgetSelectionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [Dashboard]
      summary: 保存当前用户个人仪表盘配置
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardWidgetSelectionRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /dashboard/roles/{id}/widgets:
    get:
      tags: [Dashboard]
      summary: 获取角色默认仪表盘配置
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: 角色仪表盘组件配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardWidgetSelectionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [Dashboard]
      summary: 保存角色默认仪表盘配置
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardWidgetSelectionRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /dashboard/users/{id}/widgets:
    get:
      tags: [Dashboard]
      summary: 获取指定用户仪表盘配置
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: 用户仪表盘组件配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardWidgetSelectionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [Dashboard]
      summary: 保存指定用户仪表盘配置
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardWidgetSelectionRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /admins:
    get:
      tags: [Admin]
      summary: 后台管理员分页列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Keyword'
        - $ref: '#/components/parameters/Status'
      responses:
        '200':
          $ref: '#/components/responses/PagedResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Admin]
      summary: 新增后台管理员
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [Admin]
      summary: 删除后台管理员
      parameters:
        - $ref: '#/components/parameters/Ids'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /admins/{id}:
    get:
      tags: [Admin]
      summary: 后台管理员详情
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [Admin]
      summary: 编辑后台管理员
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /admins/password:
    post:
      tags: [Admin]
      summary: 当前管理员修改密码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemPasswordRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /admins-role/{id}:
    post:
      tags: [Admin]
      summary: 设置后台管理员角色
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemRoleRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /admins-status:
    put:
      tags: [Admin]
      summary: 批量修改后台管理员状态
      parameters:
        - $ref: '#/components/parameters/Ids'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /my-resource:
    get:
      tags: [Admin]
      summary: 当前登录用户权限资源
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /admins-org/{id}:
    get:
      tags: [Organization]
      summary: 获取后台管理员组织关系
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Organization]
      summary: 同步后台管理员组织关系
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRelationSyncRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /admins-org-primary/{id}:
    put:
      tags: [Organization]
      summary: 设置主组织关系
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /roles:
    get:
      tags: [Role]
      summary: 角色分页列表
      responses:
        '200':
          $ref: '#/components/responses/PagedResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Role]
      summary: 新增角色
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [Role]
      summary: 删除角色
      parameters:
        - $ref: '#/components/parameters/Ids'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /roles/{id}:
    put:
      tags: [Role]
      summary: 编辑角色
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /roles-status/{id}:
    put:
      tags: [Role]
      summary: 修改角色状态
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /roles-resource/{id}:
    get:
      tags: [Role]
      summary: 获取角色资源选择
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Role]
      summary: 设置角色资源选择
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleResourceSyncRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /resources:
    get:
      tags: [Resource]
      summary: 资源树
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Resource]
      summary: 新增资源
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminResourceRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [Resource]
      summary: 删除资源
      parameters:
        - $ref: '#/components/parameters/Ids'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /resources/{id}:
    get:
      tags: [Resource]
      summary: 资源详情
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [Resource]
      summary: 编辑资源
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminResourceRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /resources-role/{id}:
    get:
      tags: [Resource]
      summary: 获取资源的角色授权分配
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Resource]
      summary: 设置资源的角色授权分配
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceIdsRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /resources-admins/{id}:
    get:
      tags: [Resource]
      summary: 获取资源的后台管理员授权分配
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Resource]
      summary: 设置资源的后台管理员授权分配
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceIdsRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /resources-tree:
    get:
      tags: [Resource]
      summary: 资源树列表
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /resources-lists:
    get:
      tags: [Resource]
      summary: 资源下拉选项
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /tenants:
    get:
      tags: [Tenant]
      summary: 租户列表
      parameters:
        - $ref: '#/components/parameters/Keyword'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Tenant]
      summary: 新增租户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [Tenant]
      summary: 删除租户
      parameters:
        - $ref: '#/components/parameters/Ids'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /tenants/{id}:
    put:
      tags: [Tenant]
      summary: 编辑租户
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /organizations:
    get:
      tags: [Organization]
      summary: 组织列表
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/Keyword'
