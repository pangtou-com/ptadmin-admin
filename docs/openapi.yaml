  /my-resource:
    get:
      tags: [System]
      summary: 当前登录用户权限资源
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /systems-org/{id}:
    get:
      tags: [Organization]
      summary: 获取系统管理员组织关系
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Organization]
      summary: 同步系统管理员组织关系
      parameters:
