openapi: 3.0.3
info:
  title: PTAdmin Admin API
  version: 1.0.0
  description: |
    PTAdmin 后台接口文档。

    说明：
    - 默认管理后台接口前缀为 `system`，可通过 `PTADMIN_ROUTE_PREFIX` 或 `app.prefix` 调整。
    - 除特殊声明外，所有接口统一返回 JSON：
      - 成功：`{ "code": 0, "message": "操作成功", "data": ... }`
      - 分页：`{ "code": 0, "message": "", "data": { "total": 0, "results": [] } }`
      - 失败：`{ "code": 10000/20000, "message": "错误信息" }`
    - 当前文档仅收录可直接作为 API 调用的 JSON 接口；安装页面、后台页面渲染接口未纳入。
servers:
  - url: /{adminPrefix}
    description: 后台接口前缀
    variables:
      adminPrefix:
        default: system
tags:
  - name: Auth
  - name: Upload
  - name: Asset
  - name: Operation
  - name: System
  - name: Role
  - name: Resource
  - name: Tenant
  - name: Organization
  - name: SystemConfigGroup
  - name: SystemConfig
  - name: Addon
security:
  - bearerAuth: []
paths:
  /login:
    post:
      tags: [Auth]
      summary: 管理员登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /auth/status:
    get:
      tags: [Auth]
      summary: 获取授权模块状态
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /logout:
    get:
      tags: [Auth]
      summary: 退出登录
      responses:
        '200':
          description: 返回登录地址
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          url:
                            type: string
                            example: /system/login
        default:
          $ref: '#/components/responses/ErrorResponse'

  /user/resources:
    get:
      tags: [Auth]
      summary: 获取当前登录用户角色与菜单树
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /upload:
    post:
      tags: [Upload]
      summary: 上传单文件
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadRequest'
      responses:
        '200':
          description: 返回资源信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /upload/tiny:
    post:
      tags: [Upload]
      summary: TinyMCE 上传
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadRequest'
      responses:
        '200':
          description: TinyMCE location 响应
          content:
            application/json:
              schema:
                type: object
                properties:
                  location:
                    type: string
                    example: /storage/default/20260410/demo.png
        default:
          $ref: '#/components/responses/ErrorResponse'

  /assets:
    get:
      tags: [Asset]
      summary: 资源分页列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Keyword'
        - $ref: '#/components/parameters/Group'
      responses:
        '200':
          $ref: '#/components/responses/PagedResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [Asset]
      summary: 删除资源
      parameters:
        - $ref: '#/components/parameters/Ids'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /assets/picker:
    get:
      tags: [Asset]
      summary: 资源选择器分页列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Keyword'
        - $ref: '#/components/parameters/Group'
      responses:
        '200':
          $ref: '#/components/responses/PagedResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /operations:
    get:
      tags: [Operation]
      summary: 操作日志分页列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Keyword'
      responses:
        '200':
          $ref: '#/components/responses/PagedResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /operations/{id}:
    get:
      tags: [Operation]
      summary: 操作日志详情
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /system/login:
    get:
      tags: [System]
      summary: 当前管理员登录日志
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          $ref: '#/components/responses/PagedResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /message/unread:
    get:
      tags: [Auth]
      summary: 未读消息数
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /systems:
    get:
      tags: [System]
      summary: 系统管理员分页列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Keyword'
        - $ref: '#/components/parameters/Status'
      responses:
        '200':
          $ref: '#/components/responses/PagedResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [System]
      summary: 新增系统管理员
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [System]
      summary: 删除系统管理员
      parameters:
        - $ref: '#/components/parameters/Ids'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /systems/{id}:
    get:
      tags: [System]
      summary: 系统管理员详情
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [System]
      summary: 编辑系统管理员
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /systems/password:
    post:
      tags: [System]
      summary: 当前管理员修改密码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemPasswordRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
