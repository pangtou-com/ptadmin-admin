  /system-config-groups/{id}:
    put:
      tags: [SystemConfigGroup]
      summary: 编辑系统配置分组
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemConfigGroupRequest'
      responses:
        '200':
