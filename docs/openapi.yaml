        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [Role]
      summary: 删除角色
      parameters:
        - $ref: '#/components/parameters/Ids'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /roles/{id}:
    put:
      tags: [Role]
      summary: 编辑角色
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /roles-status/{id}:
    put:
      tags: [Role]
      summary: 修改角色状态
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
