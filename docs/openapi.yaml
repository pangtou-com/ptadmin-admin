  /cloud-logout:
    get:
      tags: [Addon]
      summary: 插件云市场退出登录
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
    CodePath:
      name: code
      in: path
      required: true
      schema:
        type: string
    SectionKeyPath:
      name: sectionKey
      in: path
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 10
    Keyword:
      name: keyword
      in: query
      required: false
      schema:
        type: string
    Group:
      name: group
      in: query
      required: false
      schema:
        type: string
    Status:
      name: status
      in: query
      required: false
      schema:
        type: integer
        enum: [0, 1]
    TenantId:
      name: tenant_id
      in: query
      required: false
      schema:
        type: integer
    Ids:
      name: ids
      in: query
      required: false
      description: 逗号分隔 ID 列表，例如 `1,2,3`
      schema:
        type: string
  responses:
    SuccessResponse:
      description: 成功响应
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    PagedResponse:
      description: 分页响应
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PagedResponse'
    ErrorResponse:
      description: 失败响应
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: 操作成功
        data:
          type: object
          nullable: true
          additionalProperties: true
    PagedResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ''
        data:
          type: object
          properties:
            total:
              type: integer
              example: 12
            results:
              type: array
              items:
                type: object
                additionalProperties: true
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 20000
        message:
          type: string
          example: 参数错误
        file:
          type: string
          nullable: true
        line:
          type: integer
          nullable: true
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        code:
          type: string
          nullable: true
    LoginResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: 操作成功
        data:
          type: object
          properties:
            token:
              type: string
            user:
              type: object
              properties:
                id:
                  type: integer
                nickname:
                  type: string
                username:
                  type: string
                mobile:
                  type: string
                  nullable: true
                avatar:
                  type: string
                  nullable: true
                email:
                  type: string
                  nullable: true
                login_at:
                  type: string
                login_ip:
                  type: string
    UploadRequest:
      type: object
      required: [file]
      properties:
        group:
          type: string
          description: 上传分组，默认 `default`
        filename:
          type: string
          description: 文件字段名，默认 `file`
          example: file
        file:
          type: string
          format: binary
    UploadResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: 操作成功
        data:
          type: object
          properties:
            id:
              type: integer
            title:
              type: string
            md5:
              type: string
            mime:
              type: string
            suffix:
              type: string
            driver:
              type: string
            size:
              type: integer
            path:
              type: string
            url:
              type: string
            groups:
              type: string
    StatusRequest:
      type: object
      required: [value]
      properties:
        value:
          type: integer
          enum: [0, 1]
    AdminRequest:
      type: object
      required: [username, nickname]
      properties:
        username:
          type: string
        nickname:
          type: string
        role_id:
          type: integer
          description: 历史单角色字段；多角色设置建议调用 `admins-role/{id}`
        password:
          type: string
        mobile:
          type: string
        avatar:
          type: string
    SystemPasswordRequest:
      type: object
      required: [old_password, password, password_confirmation]
      properties:
        old_password:
          type: string
        password:
          type: string
        password_confirmation:
          type: string
    SystemRoleRequest:
      type: object
      properties:
        role_id:
          type: array
          items:
            type: integer
    RoleRequest:
      type: object
      required: [name, title]
      properties:
        name:
          type: string
          description: 角色编码
        title:
          type: string
          description: 角色名称
        note:
          type: string
        status:
          type: integer
          enum: [0, 1]
          default: 1
    RoleResourceSyncRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
    ResourceIdsRequest:
      type: object
      properties:
        resource_ids:
          type: array
          items:
            type: integer
    AdminResourceRequest:
      type: object
      required: [name, title, type, is_nav]
      properties:
        name:
          type: string
          description: 资源编码
        title:
          type: string
          description: 资源名称
        route:
          type: string
        component:
          type: string
        icon:
          type: string
        weight:
          type: integer
        note:
          type: string
        type:
          type: string
          description: 资源类型
        status:
          type: integer
          enum: [0, 1]
        is_nav:
          type: integer
          enum: [0, 1]
        controller:
          type: string
    TenantRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
        name:
          type: string
        status:
          type: integer
          enum: [0, 1]
        settings_json:
          type: object
          nullable: true
          additionalProperties: true
    OrganizationRequest:
      type: object
      required: [code, name]
      properties:
        tenant_id:
          type: integer
          nullable: true
        parent_id:
          type: integer
          default: 0
        code:
          type: string
        name:
          type: string
        status:
          type: integer
          enum: [0, 1]
        sort:
          type: integer
        meta_json:
          type: object
          nullable: true
          additionalProperties: true
    DepartmentRequest:
      type: object
      properties:
        tenant_id:
          type: integer
          nullable: true
        organization_id:
          type: integer
        parent_id:
          type: integer
          default: 0
        code:
          type: string
        name:
          type: string
        status:
          type: integer
          enum: [0, 1]
        sort:
          type: integer
        meta_json:
          type: object
          nullable: true
          additionalProperties: true
    UserRelationSyncRequest:
      type: object
      required: [relations]
      properties:
        tenant_id:
          type: integer
          nullable: true
        relations:
          type: array
          items:
            type: object
            required: [organization_id]
            properties:
              tenant_id:
                type: integer
                nullable: true
              organization_id:
                type: integer
              department_id:
                type: integer
                nullable: true
              is_primary:
                type: integer
                enum: [0, 1]
    UserRequest:
      type: object
      properties:
        username:
          type: string
        nickname:
          type: string
        bio:
          type: string
        password:
          type: string
        mobile:
          type: string
        email:
          type: string
        avatar:
          type: string
    AddonDownloadRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
        addon_id:
          type: integer
        addon_version_id:
          type: integer
    AddonFrontendModulesResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: 操作成功
        data:
          type: object
          properties:
            preload:
              type: array
              items:
                type: string
              example: [cms]
            cache:
              type: array
              items:
                type: string
              example: [cms]
            results:
              type: array
              items:
                type: object
                properties:
                  code:
                    type: string
                    example: cms
                  title:
                    type: string
                    example: 内容管理
                  version:
                    type: string
                    example: 1.2.0
                  module:
                    type: string
                    example: cms
                  sort:
                    type: integer
                    example: 20
                  preload:
                    type: boolean
                    example: true
                  keep_alive:
                    type: boolean
                    example: false
                  entry:
                    type: object
                    properties:
                      type:
                        type: string
                        example: module
                      name:
                        type: string
                        example: cms
                      scope:
                        type: string
                        example: cms
                      url:
                        type: string
                        example: /addons/cms/dist/admin/index.js
                  assets:
                    type: object
                    properties:
                      base_url:
                        type: string
                        example: /addons/cms
                      styles:
                        type: array
                        items:
                          type: string
                      scripts:
                        type: array
                        items:
                          type: string
                  cache:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                        example: true
                      version:
                        type: string
                        example: 1.2.0
                      strategy:
                        type: string
                        example: persistent
                  routes:
                    type: array
                    items:
                      type: string
                  resources:
                    type: array
                    items:
                      type: string
                  meta:
                    type: object
                    properties:
                      icon:
                        type: string
                        example: icon-cms
                      description:
                        type: string
                        example: CMS 插件
    SettingsOwner:
      type: object
      properties:
        code:
          type: string
          example: system
        name:
          type: string
          nullable: true
          example: 系统设置
    SettingsRenderDescriptor:
      type: object
      properties:
        engine:
          type: string
          example: pt-render
        version:
          type: string
          example: '1.0'
        schema:
          type: object
          nullable: true
          additionalProperties: true
    SettingsSectionCatalogItem:
      type: object
      properties:
        key:
          type: string
          example: basic
        title:
          type: string
          example: 基础配置
        description:
          type: string
          example: 站点基础配置
        icon:
          type: string
          example: Setting
        order:
          type: integer
          example: 10
        mode:
          type: string
          enum: [hosted, external_route, none]
        render:
          $ref: '#/components/schemas/SettingsRenderDescriptor'
    SettingsSystemCatalogPayload:
      type: object
      properties:
        scope:
          type: string
          example: system
        owner:
          $ref: '#/components/schemas/SettingsOwner'
        sections:
          type: array
          items:
            $ref: '#/components/schemas/SettingsSectionCatalogItem'
    SettingsPluginConfig:
      type: object
      properties:
        enabled:
          type: boolean
        mode:
          type: string
          enum: [hosted, external_route, none]
        path:
          type: string
          nullable: true
          example: /cms/settings
        sections:
          type: array
          items:
            $ref: '#/components/schemas/SettingsSectionCatalogItem'
    SettingsPluginCatalogItem:
      type: object
      properties:
        owner:
          $ref: '#/components/schemas/SettingsOwner'
        description:
          type: string
        icon:
          type: string
        enabled:
          type: boolean
        version:
          type: string
        settings:
          $ref: '#/components/schemas/SettingsPluginConfig'
    SettingsPluginCatalogPayload:
      type: object
      properties:
        scope:
          type: string
          example: plugin
        results:
          type: array
          items:
            $ref: '#/components/schemas/SettingsPluginCatalogItem'
    SettingsSectionDescriptor:
      type: object
      properties:
        key:
          type: string
          example: basic
        title:
          type: string
          example: 基础配置
        description:
          type: string
          example: 插件通用配置
    SettingsSectionMeta:
      type: object
      properties:
        editable:
          type: boolean
        supported:
          type: boolean
        updated_at:
          type: string
          nullable: true
          example: '2026-04-29 15:00:00'
        updated_by:
          type: string
          nullable: true
          example: admin
    SettingsSectionDetailPayload:
      type: object
      properties:
        scope:
          type: string
          enum: [system, plugin]
        owner:
          $ref: '#/components/schemas/SettingsOwner'
        section:
          $ref: '#/components/schemas/SettingsSectionDescriptor'
        render:
          $ref: '#/components/schemas/SettingsRenderDescriptor'
        values:
          type: object
          additionalProperties: true
        meta:
          $ref: '#/components/schemas/SettingsSectionMeta'
    SettingsSectionSaveRequest:
      type: object
      description: 推荐通过 `values` 提交；也兼容直接平铺字段。
      properties:
        values:
          type: object
          additionalProperties: true
      additionalProperties: true
    SettingsSaveResponsePayload:
      type: object
      properties:
        values:
          type: object
          additionalProperties: true
        meta:
          $ref: '#/components/schemas/SettingsSectionMeta'
    DashboardWidgetQueryRequest:
      type: object
      properties:
        tenant_id:
          type: integer
          nullable: true
        query:
          type: object
          additionalProperties: true
    DashboardWidgetActionRequest:
      type: object
      properties:
        tenant_id:
          type: integer
          nullable: true
        payload:
          type: object
          additionalProperties: true
    DashboardWidgetSelectionRequest:
      type: object
      required: [widgets]
      properties:
        widgets:
          type: array
