      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /users:
    get:
      tags: [System]
      summary: 业务用户分页列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Keyword'
      responses:
        '200':
          $ref: '#/components/responses/PagedResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /user:
    post:
      tags: [System]
      summary: 新增业务用户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /user/{id}:
    put:
      tags: [System]
      summary: 编辑业务用户
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /system-config-groups:
    get:
      tags: [SystemConfigGroup]
      summary: 系统配置分组树
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [SystemConfigGroup]
      summary: 新增系统配置分组
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemConfigGroupRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
