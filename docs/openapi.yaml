  /system-config-groups/{id}/sections:
    get:
      tags: [SystemConfigGroup]
      summary: 获取分组下 section 配置
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /system-config-groups/{id}/children:
    get:
      tags: [SystemConfigGroup]
      summary: 获取分组下直接子分组
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /system-configs:
    get:
      tags: [SystemConfig]
      summary: 系统配置导航树
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /system-configs/{id}:
    get:
      tags: [SystemConfig]
      summary: 获取配置页签 schema 与当前值
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [SystemConfig]
      summary: 保存配置页签值
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /system-config-items:
    get:
      tags: [SystemConfig]
      summary: 配置项定义分页列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Keyword'
      responses:
        '200':
          $ref: '#/components/responses/PagedResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [SystemConfig]
      summary: 新增配置项定义
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemConfigItemRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [SystemConfig]
      summary: 删除配置项定义
      parameters:
        - $ref: '#/components/parameters/Ids'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /system-config-items/{id}:
    put:
      tags: [SystemConfig]
      summary: 编辑配置项定义
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemConfigItemRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /system-config-items/values:
    post:
      tags: [SystemConfig]
      summary: 批量保存配置值
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /addon-download:
    post:
      tags: [Addon]
      summary: 获取插件下载地址
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddonDownloadRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /my-addon:
    post:
      tags: [Addon]
      summary: 获取我的插件列表
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /addon-uninstall/{code}:
    delete:
      tags: [Addon]
      summary: 卸载插件
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /addon-cloud:
    post:
      tags: [Addon]
      summary: 获取插件市场云端列表
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /cloud-login:
    post:
      tags: [Addon]
      summary: 插件云市场登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudLoginRequest'
      responses:
        '200':
          $ref: '#/components/responses/PagedResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /cloud-logout:
    get:
      tags: [Addon]
      summary: 插件云市场退出登录
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 10
    Keyword:
      name: keyword
      in: query
      required: false
      schema:
        type: string
    Group:
      name: group
      in: query
      required: false
      schema:
        type: string
    Status:
      name: status
      in: query
      required: false
      schema:
        type: integer
        enum: [0, 1]
    TenantId:
      name: tenant_id
      in: query
      required: false
      schema:
        type: integer
    Ids:
      name: ids
      in: query
      required: false
      description: 逗号分隔 ID 列表，例如 `1,2,3`
      schema:
        type: string
  responses:
    SuccessResponse:
      description: 成功响应
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    PagedResponse:
      description: 分页响应
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PagedResponse'
    ErrorResponse:
      description: 失败响应
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: 操作成功
        data:
          type: object
          nullable: true
          additionalProperties: true
    PagedResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ''
        data:
          type: object
          properties:
            total:
              type: integer
              example: 12
            results:
              type: array
              items:
                type: object
                additionalProperties: true
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 20000
        message:
          type: string
          example: 参数错误
        file:
          type: string
          nullable: true
        line:
          type: integer
          nullable: true
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        code:
          type: string
          nullable: true
    LoginResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: 操作成功
        data:
          type: object
          properties:
            token:
              type: string
            user:
              type: object
              properties:
                id:
                  type: integer
                nickname:
                  type: string
                username:
                  type: string
                mobile:
                  type: string
                  nullable: true
                avatar:
                  type: string
                  nullable: true
                email:
                  type: string
                  nullable: true
                login_at:
                  type: string
                login_ip:
                  type: string
    UploadRequest:
      type: object
      required: [file]
      properties:
        group:
          type: string
          description: 上传分组，默认 `default`
        filename:
          type: string
          description: 文件字段名，默认 `file`
          example: file
        file:
          type: string
          format: binary
    UploadResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: 操作成功
        data:
          type: object
          properties:
            id:
              type: integer
            title:
              type: string
            md5:
              type: string
            mime:
              type: string
            suffix:
              type: string
            driver:
              type: string
            size:
              type: integer
            path:
              type: string
            url:
              type: string
            groups:
              type: string
    StatusRequest:
      type: object
      required: [value]
      properties:
        value:
          type: integer
          enum: [0, 1]
    SystemRequest:
      type: object
      required: [username, nickname]
      properties:
        username:
          type: string
        nickname:
          type: string
        role_id:
          type: integer
          description: 历史单角色字段；多角色设置建议调用 `systems-role/{id}`
        password:
          type: string
        mobile:
          type: string
        avatar:
          type: string
    SystemPasswordRequest:
      type: object
      required: [old_password, password, password_confirmation]
      properties:
        old_password:
          type: string
        password:
          type: string
        password_confirmation:
          type: string
    SystemRoleRequest:
      type: object
      properties:
        role_id:
          type: array
          items:
            type: integer
    RoleRequest:
      type: object
      required: [name, title]
      properties:
        name:
          type: string
          description: 角色编码
        title:
          type: string
          description: 角色名称
        note:
          type: string
        status:
          type: integer
          enum: [0, 1]
          default: 1
    RoleResourceSyncRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
    ResourceIdsRequest:
      type: object
      properties:
        resource_ids:
          type: array
          items:
            type: integer
    AdminResourceRequest:
      type: object
      required: [name, title, type, is_nav]
      properties:
        name:
          type: string
          description: 资源编码
        title:
          type: string
          description: 资源名称
        route:
          type: string
        component:
          type: string
        icon:
          type: string
        weight:
          type: integer
        note:
          type: string
        type:
          type: string
          description: 资源类型
        status:
          type: integer
          enum: [0, 1]
        is_nav:
          type: integer
          enum: [0, 1]
        controller:
          type: string
    AdminResourceFieldRequest:
      type: object
      properties:
        fields:
          type: array
          items:
            type: object
            required: [name]
            properties:
              name:
                type: string
              title:
                type: string
              status:
                type: integer
                enum: [0, 1]
              sort:
                type: integer
              weight:
                type: integer
              abilities:
                type: array
                items:
                  type: string
              note:
                type: string
    TenantRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
        name:
          type: string
        status:
          type: integer
          enum: [0, 1]
        settings_json:
          type: object
          nullable: true
          additionalProperties: true
    OrganizationRequest:
      type: object
      required: [code, name]
      properties:
        tenant_id:
          type: integer
          nullable: true
        parent_id:
          type: integer
          default: 0
        code:
          type: string
        name:
          type: string
        status:
          type: integer
          enum: [0, 1]
        sort:
          type: integer
        meta_json:
          type: object
          nullable: true
          additionalProperties: true
    DepartmentRequest:
      type: object
      properties:
        tenant_id:
          type: integer
          nullable: true
        organization_id:
          type: integer
        parent_id:
          type: integer
          default: 0
        code:
          type: string
        name:
          type: string
        status:
          type: integer
          enum: [0, 1]
        sort:
          type: integer
        meta_json:
          type: object
          nullable: true
          additionalProperties: true
    UserRelationSyncRequest:
      type: object
      required: [relations]
      properties:
        tenant_id:
          type: integer
          nullable: true
        relations:
          type: array
          items:
            type: object
            required: [organization_id]
            properties:
              tenant_id:
                type: integer
                nullable: true
              organization_id:
                type: integer
              department_id:
                type: integer
                nullable: true
              is_primary:
                type: integer
                enum: [0, 1]
    UserRequest:
      type: object
      properties:
        username:
          type: string
        nickname:
          type: string
        bio:
          type: string
        password:
          type: string
        mobile:
          type: string
        email:
          type: string
        avatar:
          type: string
    SystemConfigGroupRequest:
      type: object
      required: [title, name]
      properties:
        title:
          type: string
        name:
          type: string
        weight:
          type: integer
        parent_id:
          type: integer
          default: 0
        intro:
          type: string
        status:
          type: integer
          enum: [0, 1]
    SystemConfigItemRequest:
      type: object
      required: [system_config_group_id, title, name, type]
      properties:
        system_config_group_id:
          type: integer
        title:
          type: string
        name:
          type: string
        type:
          type: string
        value:
          type: string
        default_val:
          type: string
        weight:
          type: integer
        intro:
          type: string
        extra:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
            - type: object
              additionalProperties: true
    AddonDownloadRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
        addon_id:
          type: integer
        addon_version_id:
          type: integer
    CloudLoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
